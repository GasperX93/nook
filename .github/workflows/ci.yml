name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-types-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - run: npm ci
      - run: cd ui && npm ci

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run check:types

      - name: Backend tests
        run: npm run test:unit

      - name: Frontend tests
        run: cd ui && npm test
