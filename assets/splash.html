<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Nook</title>
  <style>
    @font-face {
      font-family: 'iA-Writer';
      src: url('iAWriterQuattroS-Regular.woff');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      width: 800px;
      height: 600px;
      overflow: hidden;
      background: rgb(15, 17, 23);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'iA-Writer', serif;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgb(247, 104, 8);
      margin-bottom: 20px;
      box-shadow: 0 0 12px rgba(247, 104, 8, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .wordmark {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgb(240, 244, 248);
    }


    .tagline {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: rgb(120, 130, 150);
    }

    .status {
      position: absolute;
      bottom: 44px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgb(60, 68, 86);
    }
  </style>
</head>
<body>
  <div class='dot'></div>
  <div class='wordmark'>Nook</div>
  <div class='tagline'>Drive on top of Swarm Decentralised Storage</div>

  <div class='status'><span id='message'>Starting</span><span id='dots'></span></div>
</body>
<script>
  const urlParams = new URLSearchParams(window.location.search)

  if (urlParams.has('msg')) {
    document.getElementById('message').innerText = decodeURI(urlParams.get('msg'))
  }

  const dotsElem = document.getElementById('dots')
  setInterval(() => {
    dotsElem.innerText = dotsElem.innerText.length >= 3 ? '' : dotsElem.innerText + '.'
  }, 500)
</script>
</html>
